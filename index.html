<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Storage e Demurrage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: #1e3a5f;
            padding: 24px 32px;
            margin-bottom: 0;
        }

        .header-top {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: white;
            border-radius: 8px;
            padding: 6px;
        }

        .logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .header-text {
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header h1 {
            color: white;
            font-size: 22px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin: 0;
            margin-top: 3px;
            text-align: left;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            font-size: 11px;
        }

        .form-container {
            padding: 32px 40px 40px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        label span {
            color: #999;
            font-size: 12px;
            font-weight: normal;
            display: block;
            margin-top: 3px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px; /* 16px prevents iOS zoom on focus */
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #1e3a5f;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
            min-height: 48px;
        }

        button:hover {
            background: #152a45;
        }

        button:active {
            background: #1e3a5f;
        }

        button.secondary {
            background: #e8e8e8;
            color: #333;
        }

        button.secondary:hover {
            background: #d8d8d8;
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            background: #1e3a5f;
            border-radius: 4px;
            color: white;
            text-align: center;
            display: none;
        }

        #result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-total {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .result-details {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            text-align: left;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .result-row:last-child {
            margin-bottom: 0;
        }

        .period-item {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 15px;
            position: relative;
        }

        .period-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .period-title {
            font-weight: 600;
            color: #1e3a5f;
            font-size: 14px;
            flex: 1;
        }

        .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.2s;
            padding: 0;
            color: #d32f2f;
        }

        .remove-btn:hover {
            opacity: 0.7;
        }

        .period-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .period-inputs .form-group {
            margin-bottom: 0;
        }

        .period-inputs label {
            font-size: 13px;
            margin-bottom: 6px;
        }

        .period-inputs label span {
            font-size: 11px;
        }

        .period-inputs input {
            padding: 10px;
            font-size: 16px; /* prevent iOS zoom */
        }

        .add-period-btn {
            background: white;
            color: #1e3a5f;
            padding: 10px 20px;
            border: 2px dashed #1e3a5f;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .add-period-btn:hover {
            background: #f5f5f5;
            border-style: solid;
        }

        .periods-container {
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
                background: white;
                align-items: flex-start;
            }

            .container {
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
            }

            .header {
                padding: 16px 20px;
            }

            .logo {
                width: 52px;
                height: 52px;
            }

            .header h1 {
                font-size: 18px;
            }

            .form-container {
                padding: 20px 16px 32px;
            }

            .button-group {
                flex-direction: column;
            }

            .result-total {
                font-size: 28px;
            }

            .period-inputs {
                grid-template-columns: 1fr;
            }

            .add-period-btn {
                width: 100%;
                padding: 12px;
                min-height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="logo">
                    <img src="assets/Navex_VH (3).png" alt="NAVEX Logo">
                </div>
                <div class="header-text">
                    <h1>Armazenagem & Demurrage</h1>
                    <p>Calculadora de Custos</p>
                </div>
            </div>
        </div>

        <div class="form-container">
        <form id="calculatorForm">
            <div class="form-group">
                <label for="releaseDate">
                    Data de Descarregamento
                    <span>Quando o contentor foi descarregado ao cais</span>
                </label>
                <input type="date" id="releaseDate">
            </div>

            <div class="form-group">
                <label for="pickupDate">
                    Data de Retirada
                    <span>Quando o contentor será levantado</span>
                </label>
                <input type="date" id="pickupDate">
            </div>

            <div class="form-group">
                <label for="freeDays">
                    Dias Livres
                    <span>Período sem cobrança</span>
                </label>
                <input type="number" id="freeDays" value="7" min="0">
            </div>

            <button type="button" class="add-period-btn" onclick="addPeriod()">+ Adicionar Período</button>

            <div class="periods-container" id="periodsContainer"></div>

            <div class="form-group">
                <label for="totalDays">
                    Total de Dias
                    <span>Desde o descarregamento até à retirada</span>
                </label>
                <input type="number" id="totalDays" value="20" min="1">
            </div>

            <div class="button-group">
                <button type="button" onclick="calculate()">Calcular</button>
                <button type="button" class="secondary" onclick="resetForm()">Limpar Tudo</button>
            </div>
        </form>

        <div id="result"></div>
        </div>
    </div>

    <script>
        let periodCount = 0;
        let periods = [];

        function initializePeriods() {
            periods = [
                { id: 0, days: 10, rate: 50 },
                { id: 1, days: 0, rate: 100 }
            ];
            periodCount = 2;
            renderPeriods();
        }

        function renderPeriods() {
            const container = document.getElementById('periodsContainer');
            container.innerHTML = '';

            periods.forEach((period, index) => {
                const periodDiv = document.createElement('div');
                periodDiv.className = 'period-item';
                periodDiv.id = `period-${period.id}`;
                periodDiv.innerHTML = `
                    ${periods.length > 1 ? `<button type="button" class="remove-btn" onclick="removePeriod(${period.id})" title="Remover período">×</button>` : ''}
                    <div class="period-header">
                        <span class="period-title">Período ${index + 1}</span>
                    </div>
                    <div class="period-inputs">
                        <div class="form-group">
                            <label>
                                Duração (dias)
                                <span>Quantos dias dura este período</span>
                            </label>
                            <input type="number" data-period-id="${period.id}" data-field="days" value="${period.days}" min="0" class="period-input">
                        </div>
                        <div class="form-group">
                            <label>
                                Tarifa (€/dia)
                                <span>Custo por dia neste período</span>
                            </label>
                            <input type="number" data-period-id="${period.id}" data-field="rate" value="${period.rate}" step="0.01" min="0" class="period-input">
                        </div>
                    </div>
                `;
                container.appendChild(periodDiv);
            });

            document.querySelectorAll('.period-input').forEach(input => {
                input.addEventListener('change', updatePeriodValue);
            });
        }

        function updatePeriodValue(e) {
            const periodId = parseInt(e.target.dataset.periodId);
            const field = e.target.dataset.field;
            const value = field === 'days' ? parseInt(e.target.value) || 0 : parseFloat(e.target.value) || 0;

            const period = periods.find(p => p.id === periodId);
            if (period) {
                period[field] = value;
            }
        }

        function addPeriod() {
            periods.push({ id: periodCount++, days: 0, rate: 50 });
            renderPeriods();
        }

        function removePeriod(id) {
            periods = periods.filter(p => p.id !== id);
            renderPeriods();
        }

        function calculate() {
            const freeDays = parseInt(document.getElementById('freeDays').value) || 0;
            const totalDays = parseInt(document.getElementById('totalDays').value) || 0;

            let cost = 0;
            let chargedDays = Math.max(0, totalDays - freeDays);
            let breakdown = [];

            let daysFromStart = freeDays;

            for (let period of periods) {
                if (chargedDays <= 0) break;

                const daysInPeriod = Math.min(chargedDays, period.days || Infinity);
                const periodCost = daysInPeriod * period.rate;
                cost += periodCost;

                breakdown.push({
                    startDay: daysFromStart + 1,
                    endDay: daysFromStart + daysInPeriod,
                    days: daysInPeriod,
                    rate: period.rate,
                    subtotal: periodCost
                });

                chargedDays -= daysInPeriod;
                daysFromStart += daysInPeriod;
            }

            const resultDiv = document.getElementById('result');
            let detailsHTML = `
                <div class="result-total">€${cost.toFixed(2)}</div>
                <div class="result-details">
                    <div class="result-row">
                        <span>Dias Livres:</span>
                        <span>${freeDays} dias</span>
                    </div>
            `;

            breakdown.forEach((item, idx) => {
                detailsHTML += `
                    <div class="result-row" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.2);">
                        <span>Período ${idx + 1} (dias ${item.startDay}-${item.endDay}):</span>
                        <span>${item.days} × €${item.rate.toFixed(2)}</span>
                    </div>
                    <div class="result-row" style="opacity: 0.9; margin-bottom: 8px;">
                        <span style="font-size: 12px;">Subtotal:</span>
                        <span style="font-size: 12px;">€${item.subtotal.toFixed(2)}</span>
                    </div>
                `;
            });

            detailsHTML += '</div>';

            resultDiv.innerHTML = detailsHTML;
            resultDiv.classList.add('show');
        }

        function resetForm() {
            document.getElementById('calculatorForm').reset();
            document.getElementById('releaseDate').value = '';
            document.getElementById('pickupDate').value = '';
            document.getElementById('freeDays').value = '7';
            document.getElementById('totalDays').value = '20';
            initializePeriods();
            document.getElementById('result').classList.remove('show');
        }

        document.getElementById('calculatorForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });

        // Inicializar ao carregar a página
        window.addEventListener('load', function() {
            initializePeriods();
            
            document.getElementById('releaseDate').addEventListener('change', calculateDays);
            document.getElementById('pickupDate').addEventListener('change', calculateDays);
        });

        function calculateDays() {
            const releaseDate = document.getElementById('releaseDate').value;
            const pickupDate = document.getElementById('pickupDate').value;

            if (releaseDate && pickupDate) {
                const start = new Date(releaseDate);
                const end = new Date(pickupDate);
                
                // Calcular diferença em milissegundos e converter para dias
                const diffTime = end - start;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // +1 para contar ambos os dias
                
                if (diffDays > 0) {
                    document.getElementById('totalDays').value = diffDays;
                }
            }
        }
    </script>
</body>
</html>
