<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Storage e Detention</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: #1e3a5f;
            padding: 24px 32px;
            margin-bottom: 0;
        }

        .header-top {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: white;
            border-radius: 8px;
            padding: 6px;
        }

        .logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .header-text {
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header h1 {
            color: white;
            font-size: 22px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin: 0;
            margin-top: 3px;
            text-align: left;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            font-size: 11px;
        }

        .form-container {
            padding: 32px 40px 40px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        label span {
            color: #999;
            font-size: 12px;
            font-weight: normal;
            display: block;
            margin-top: 3px;
        }


        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px; /* 16px prevents iOS zoom on focus */
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #1e3a5f;
        }

.button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            touch-action: manipulation;
            min-height: 48px;
        }

        button:hover {
            background: #152a45;
        }

        button:active {
            background: #1e3a5f;
        }

        button.secondary {
            background: #e8e8e8;
            color: #333;
        }

        button.secondary:hover {
            background: #d8d8d8;
        }

        #result {
            margin-top: 30px;
            display: none;
        }

        #result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            background: #1e3a5f;
            border-radius: 8px 8px 0 0;
            padding: 20px 24px;
            text-align: center;
        }

        .result-label {
            color: rgba(255,255,255,0.65);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .result-total {
            font-size: 40px;
            font-weight: 700;
            color: white;
            letter-spacing: -1px;
        }

        .result-body {
            border: 1px solid #dde3ec;
            border-top: none;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }

        .result-free-days {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f0f4f8;
            border-bottom: 1px solid #dde3ec;
            font-size: 13px;
            color: #555;
        }

        .result-free-days .free-label {
            font-weight: 500;
        }

        .result-free-days .free-dates {
            font-size: 12px;
            color: #888;
        }

        .result-period {
            border-bottom: 1px solid #eaeef2;
            padding: 14px 16px;
            background: white;
        }

        .result-period:last-child {
            border-bottom: none;
        }

        .result-period-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .result-period-name {
            font-weight: 600;
            font-size: 13px;
            color: #1e3a5f;
        }

        .result-period-subtotal {
            font-weight: 700;
            font-size: 15px;
            color: #1e3a5f;
        }

        .result-period-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-period-dates {
            font-size: 12px;
            color: #888;
        }

        .result-period-calc {
            font-size: 12px;
            color: #999;
        }

        .result-btn-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .result-copy-btn,
        .result-pdf-btn {
            flex: 1;
            padding: 11px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: unset;
            border: 1.5px solid;
        }

        .result-copy-btn {
            background: white;
            color: #1e3a5f;
            border-color: #1e3a5f;
        }

        .result-copy-btn:hover {
            background: #1e3a5f;
            color: white;
        }

        .result-pdf-btn {
            background: white;
            color: #555;
            border-color: #bbb;
        }

        .result-pdf-btn:hover {
            background: #555;
            color: white;
            border-color: #555;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
            }

            .header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .result-header {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .result-free-days {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .form-container > form,
            .result-btn-group {
                display: none !important;
            }

            #result {
                display: block !important;
                margin-top: 0;
            }

            .print-header {
                display: flex !important;
            }
        }

        .print-header {
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #1e3a5f;
        }

        .print-header-title {
            font-size: 20px;
            font-weight: 700;
            color: #1e3a5f;
        }

        .print-header-meta {
            font-size: 12px;
            color: #888;
            text-align: right;
        }


        .period-item {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 15px;
            position: relative;
        }

        .period-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .period-title {
            font-weight: 600;
            color: #1e3a5f;
            font-size: 14px;
            flex: 1;
        }

        .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.2s;
            padding: 0;
            color: #d32f2f;
        }

        .remove-btn:hover {
            opacity: 0.7;
        }

        .period-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .period-inputs .form-group {
            margin-bottom: 0;
        }

        .period-inputs label {
            font-size: 13px;
            margin-bottom: 6px;
        }

        .period-inputs label span {
            font-size: 11px;
        }

        .period-inputs input {
            padding: 10px;
            font-size: 16px; /* prevent iOS zoom */
        }

        .add-period-btn {
            background: white;
            color: #1e3a5f;
            padding: 10px 20px;
            border: 2px dashed #1e3a5f;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .add-period-btn:hover {
            background: #f5f5f5;
            border-style: solid;
        }

        .periods-container {
            margin-bottom: 20px;
        }

        .detention-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            cursor: pointer;
            user-select: none;
        }

        .detention-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1e3a5f;
            flex-shrink: 0;
        }

        .detention-toggle-label {
            font-weight: 600;
            font-size: 14px;
            color: #1e3a5f;
        }

        .detention-section {
            background: #f0f4f8;
            border: 1px solid #dde3ec;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 22px;
            display: none;
        }

        .detention-section.show {
            display: block;
        }

        .detention-section .form-group {
            margin-bottom: 14px;
        }

        .detention-section .form-group:last-child {
            margin-bottom: 0;
        }

        .result-section-divider {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #f0f4f8;
            border-top: 1px solid #dde3ec;
            border-bottom: 1px solid #dde3ec;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #555;
        }

        .result-grand-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #1e3a5f;
            color: white;
            font-weight: 700;
            font-size: 15px;
        }

        @media print {
            .result-grand-total {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background: #0d2240 !important;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
                background: white;
                align-items: flex-start;
            }

            .container {
                border-radius: 0;
                box-shadow: none;
                min-height: 100vh;
            }

            .header {
                padding: 16px 20px;
            }

            .logo {
                width: 52px;
                height: 52px;
            }

            .header h1 {
                font-size: 18px;
            }

            .form-container {
                padding: 20px 16px 32px;
            }

            .button-group {
                flex-direction: column;
            }

            .result-total {
                font-size: 28px;
            }

            .period-inputs {
                grid-template-columns: 1fr;
            }

            .add-period-btn {
                width: 100%;
                padding: 12px;
                min-height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <div class="logo">
                    <img src="assets/Navex_VH (3).png" alt="NAVEX Logo">
                </div>
                <div class="header-text">
                    <h1>Calculadora de Storage e Detention</h1>
                    <p>Calculadora de Custos Extra</p>
                </div>
            </div>
        </div>

        <div class="form-container">
        <form id="calculatorForm">
            <div class="form-group">
                <label for="releaseDate">
                    Data de Descarregamento
                    <span>Quando o contentor foi descarregado para o cais</span>
                </label>
                <input type="date" id="releaseDate">
            </div>

            <div class="form-group">
                <label for="pickupDate">
                    Data de Levantamento
                    <span>Quando o contentor será levantado</span>
                </label>
                <input type="date" id="pickupDate">
            </div>

            <div class="form-group">
                <label for="freeDays">
                    Dias Livres
                    <span>Período sem cobrança</span>
                </label>
                <input type="number" id="freeDays" value="7" min="0">
            </div>

            <button type="button" class="add-period-btn" onclick="addPeriod()">+ Adicionar Período</button>

            <div class="periods-container" id="periodsContainer"></div>

            <div class="form-group">
                <label for="totalDays">
                    Total de Dias
                    <span>Desde o descarregamento até ao levantamento</span>
                </label>
                <input type="number" id="totalDays" value="20" min="1">
            </div>

            <label class="detention-toggle">
                <input type="checkbox" id="detentionEnabled" onchange="toggleDetention()">
                <span class="detention-toggle-label">Incluir Detention</span>
            </label>

            <div class="detention-section" id="detentionSection">
                <div class="form-group">
                    <label for="returnDate">
                        Data de Devolução
                        <span>Quando o contentor é devolvido vazio ao armador</span>
                    </label>
                    <input type="date" id="returnDate">
                </div>
                <div class="form-group">
                    <label for="detentionFreeDays">
                        Dias Livres (Detention)
                        <span>Dias acordados sem cobrança</span>
                    </label>
                    <input type="number" id="detentionFreeDays" value="7" min="0">
                </div>
                <button type="button" class="add-period-btn" onclick="addDetentionPeriod()">+ Adicionar Período Detention</button>
                <div class="periods-container" id="detentionPeriodsContainer"></div>
            </div>

            <div class="button-group">
                <button type="button" onclick="calculate()">Calcular</button>
                <button type="button" class="secondary" onclick="resetForm()">Limpar Tudo</button>
            </div>
        </form>

        <div id="result"></div>
        </div>
    </div>

    <script>
        let periodCount = 0;
        let periods = [];
        let detentionPeriodCount = 0;
        let detentionPeriods = [];
        let lastResult = null;

        function initializePeriods() {
            periods = [
                { id: 0, days: 10, rate: 50 },
                { id: 1, days: 0, rate: 100 }
            ];
            periodCount = 2;
            renderPeriods();
        }

        function initializeDetentionPeriods() {
            detentionPeriods = [
                { id: 0, days: 10, rate: 50 },
                { id: 1, days: 0, rate: 100 }
            ];
            detentionPeriodCount = 2;
            renderDetentionPeriods();
        }

        function renderDetentionPeriods() {
            const container = document.getElementById('detentionPeriodsContainer');
            if (!container) return;
            container.innerHTML = '';

            detentionPeriods.forEach((period, index) => {
                const isLast = index === detentionPeriods.length - 1;
                const periodDiv = document.createElement('div');
                periodDiv.className = 'period-item';
                periodDiv.id = `det-period-${period.id}`;
                periodDiv.innerHTML = `
                    ${detentionPeriods.length > 1 ? `<button type="button" class="remove-btn" onclick="removeDetentionPeriod(${period.id})" title="Remover período">×</button>` : ''}
                    <div class="period-header">
                        <span class="period-title">Período ${index + 1}${isLast ? ' (em diante)' : ''}</span>
                    </div>
                    <div class="period-inputs" style="${isLast ? 'grid-template-columns: 1fr;' : ''}">
                        ${!isLast ? `
                        <div class="form-group">
                            <label>
                                Duração (dias)
                                <span>Quantos dias dura este período</span>
                            </label>
                            <input type="number" data-det-period-id="${period.id}" data-field="days" value="${period.days}" min="0" class="det-period-input">
                        </div>` : ''}
                        <div class="form-group">
                            <label>
                                Tarifa (€/dia)
                                <span>Custo por dia neste período</span>
                            </label>
                            <input type="number" data-det-period-id="${period.id}" data-field="rate" value="${period.rate}" step="0.01" min="0" class="det-period-input">
                        </div>
                    </div>
                `;
                container.appendChild(periodDiv);
            });

            document.querySelectorAll('.det-period-input').forEach(input => {
                input.addEventListener('change', updateDetentionPeriodValue);
            });
        }

        function updateDetentionPeriodValue(e) {
            const periodId = parseInt(e.target.dataset.detPeriodId);
            const field = e.target.dataset.field;
            const value = field === 'days' ? parseInt(e.target.value) || 0 : parseFloat(e.target.value) || 0;
            const period = detentionPeriods.find(p => p.id === periodId);
            if (period) period[field] = value;
        }

        function addDetentionPeriod() {
            detentionPeriods.push({ id: detentionPeriodCount++, days: 0, rate: 50 });
            renderDetentionPeriods();
        }

        function removeDetentionPeriod(id) {
            detentionPeriods = detentionPeriods.filter(p => p.id !== id);
            renderDetentionPeriods();
        }

        function renderPeriods() {
            const container = document.getElementById('periodsContainer');
            container.innerHTML = '';

            periods.forEach((period, index) => {
                const isLast = index === periods.length - 1;
                const periodDiv = document.createElement('div');
                periodDiv.className = 'period-item';
                periodDiv.id = `period-${period.id}`;
                periodDiv.innerHTML = `
                    ${periods.length > 1 ? `<button type="button" class="remove-btn" onclick="removePeriod(${period.id})" title="Remover período">×</button>` : ''}
                    <div class="period-header">
                        <span class="period-title">Período ${index + 1}${isLast ? ' (em diante)' : ''}</span>
                    </div>
                    <div class="period-inputs" style="${isLast ? 'grid-template-columns: 1fr;' : ''}">
                        ${!isLast ? `
                        <div class="form-group">
                            <label>
                                Duração (dias)
                                <span>Quantos dias dura este período</span>
                            </label>
                            <input type="number" data-period-id="${period.id}" data-field="days" value="${period.days}" min="0" class="period-input">
                        </div>` : ''}
                        <div class="form-group">
                            <label>
                                Tarifa (€/dia)
                                <span>Custo por dia neste período</span>
                            </label>
                            <input type="number" data-period-id="${period.id}" data-field="rate" value="${period.rate}" step="0.01" min="0" class="period-input">
                        </div>
                    </div>
                `;
                container.appendChild(periodDiv);
            });

            document.querySelectorAll('.period-input').forEach(input => {
                input.addEventListener('change', updatePeriodValue);
            });
        }

        function updatePeriodValue(e) {
            const periodId = parseInt(e.target.dataset.periodId);
            const field = e.target.dataset.field;
            const value = field === 'days' ? parseInt(e.target.value) || 0 : parseFloat(e.target.value) || 0;

            const period = periods.find(p => p.id === periodId);
            if (period) {
                period[field] = value;
            }
        }

        function addPeriod() {
            periods.push({ id: periodCount++, days: 0, rate: 50 });
            renderPeriods();
        }

        function removePeriod(id) {
            periods = periods.filter(p => p.id !== id);
            renderPeriods();
        }

        // Aceita YYYY-MM-DD (type=date) ou DD/MM/AAAA (escrito à mão)
        function parseDate(str) {
            if (!str) return null;
            // formato do input type=date: YYYY-MM-DD
            let m = str.trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
            if (m) {
                const d = new Date(+m[1], +m[2] - 1, +m[3]);
                return isNaN(d) ? null : d;
            }
            // formato escrito à mão: DD/MM/AAAA
            m = str.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
            if (m) {
                const d = new Date(+m[3], +m[2] - 1, +m[1]);
                return isNaN(d) ? null : d;
            }
            return null;
        }

        function addCalendarDays(date, days) {
            const result = new Date(date);
            result.setDate(result.getDate() + days);
            return result;
        }

        function formatDate(date) {
            return date.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        let detentionInitialized = false;

        function toggleDetention() {
            const enabled = document.getElementById('detentionEnabled').checked;
            document.getElementById('detentionSection').classList.toggle('show', enabled);
            if (enabled && !detentionInitialized) {
                initializeDetentionPeriods();
                detentionInitialized = true;
            }
        }

        function calculateDetention(pickupDate) {
            const enabled = document.getElementById('detentionEnabled').checked;
            if (!enabled) return null;

            const returnDateStr = document.getElementById('returnDate').value;
            const returnDate = parseDate(returnDateStr);
            const detentionFreeDays = parseInt(document.getElementById('detentionFreeDays').value) || 0;

            if (!returnDate) return null;

            // dias desde a retirada até à devolução (inclusive)
            const baseDays = pickupDate
                ? Math.ceil((returnDate - pickupDate) / (1000 * 60 * 60 * 24)) + 1
                : null;

            if (baseDays === null || baseDays <= 0) return null;

            let remaining = Math.max(0, baseDays - detentionFreeDays);
            let cost = 0;
            let breakdown = [];
            let daysFromStart = detentionFreeDays;

            for (let period of detentionPeriods) {
                if (remaining <= 0) break;
                const daysInPeriod = Math.min(remaining, period.days || Infinity);
                const periodCost = daysInPeriod * period.rate;
                cost += periodCost;
                breakdown.push({
                    days: daysInPeriod,
                    rate: period.rate,
                    subtotal: periodCost,
                    calStart: pickupDate ? addCalendarDays(pickupDate, daysFromStart) : null,
                    calEnd: pickupDate ? addCalendarDays(pickupDate, daysFromStart + daysInPeriod - 1) : null,
                    isLast: period.days === 0,
                });
                remaining -= daysInPeriod;
                daysFromStart += daysInPeriod;
            }

            const freeDatesLabel = pickupDate && detentionFreeDays > 0
                ? `${formatDate(pickupDate)} – ${formatDate(addCalendarDays(pickupDate, detentionFreeDays - 1))}`
                : '';

            return { cost, breakdown, detentionFreeDays, freeDatesLabel, returnDate };
        }

        function calculate() {
            const freeDays = parseInt(document.getElementById('freeDays').value) || 0;
            const totalDays = parseInt(document.getElementById('totalDays').value) || 0;
            const releaseDateStr = document.getElementById('releaseDate').value;
            const releaseDate = parseDate(releaseDateStr);
            const pickupDateStr = document.getElementById('pickupDate').value;
            const pickupDate = parseDate(pickupDateStr);

            let cost = 0;
            let chargedDays = Math.max(0, totalDays - freeDays);
            let breakdown = [];

            let daysFromStart = freeDays;

            for (let period of periods) {
                if (chargedDays <= 0) break;

                const daysInPeriod = Math.min(chargedDays, period.days || Infinity);
                const periodCost = daysInPeriod * period.rate;
                cost += periodCost;

                breakdown.push({
                    startDay: daysFromStart + 1,
                    endDay: daysFromStart + daysInPeriod,
                    days: daysInPeriod,
                    rate: period.rate,
                    subtotal: periodCost,
                    calStart: releaseDate ? addCalendarDays(releaseDate, daysFromStart) : null,
                    calEnd: releaseDate ? addCalendarDays(releaseDate, daysFromStart + daysInPeriod - 1) : null,
                });

                chargedDays -= daysInPeriod;
                daysFromStart += daysInPeriod;
            }

            const freeDatesLabel = releaseDate && freeDays > 0
                ? `${formatDate(releaseDate)} – ${formatDate(addCalendarDays(releaseDate, freeDays - 1))}`
                : '';

            const detention = calculateDetention(pickupDate);
            const grandTotal = cost + (detention ? detention.cost : 0);

            let periodsHTML = '';
            breakdown.forEach((item, idx) => {
                const isLastItem = idx === breakdown.length - 1 && periods[periods.length - 1].days === 0;
                const periodName = `Período ${idx + 1}${isLastItem ? ' — em diante' : ''}`;
                const datesLabel = item.calStart
                    ? `${formatDate(item.calStart)} – ${formatDate(item.calEnd)}`
                    : isLastItem
                        ? `Dia ${item.startDay} em diante`
                        : `Dias ${item.startDay}–${item.endDay}`;
                const calcLabel = `${item.days} dias × €${item.rate.toFixed(2)}/dia`;
                periodsHTML += `
                    <div class="result-period">
                        <div class="result-period-top">
                            <span class="result-period-name">${periodName}</span>
                            <span class="result-period-subtotal">€${item.subtotal.toFixed(2)}</span>
                        </div>
                        <div class="result-period-bottom">
                            <span class="result-period-dates">${datesLabel}</span>
                            <span class="result-period-calc">${calcLabel}</span>
                        </div>
                    </div>`;
            });

            let detentionHTML = '';
            if (detention) {
                let detPeriodsHTML = '';
                detention.breakdown.forEach((item, idx) => {
                    const periodName = `Período ${idx + 1}${item.isLast ? ' — em diante' : ''}`;
                    const datesLabel = item.calStart
                        ? `${formatDate(item.calStart)} – ${formatDate(item.calEnd)}`
                        : `${item.days} dias`;
                    const calcLabel = `${item.days} dias × €${item.rate.toFixed(2)}/dia`;
                    detPeriodsHTML += `
                        <div class="result-period">
                            <div class="result-period-top">
                                <span class="result-period-name">${periodName}</span>
                                <span class="result-period-subtotal">€${item.subtotal.toFixed(2)}</span>
                            </div>
                            <div class="result-period-bottom">
                                <span class="result-period-dates">${datesLabel}</span>
                                <span class="result-period-calc">${calcLabel}</span>
                            </div>
                        </div>`;
                });
                detentionHTML = `
                    <div class="result-section-divider">Detention</div>
                    <div class="result-free-days">
                        <span class="free-label">Dias Livres — ${detention.detentionFreeDays} dias</span>
                        <span class="free-dates">${detention.freeDatesLabel}</span>
                    </div>
                    ${detPeriodsHTML}`;
            }

            const resultDiv = document.getElementById('result');
            const today = new Date().toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
            resultDiv.innerHTML = `
                <div class="print-header">
                    <div>
                        <div class="print-header-title">Storage</div>
                        <div style="font-size:12px;color:#888;margin-top:2px;">Resumo de Custos</div>
                    </div>
                    <div class="print-header-meta">
                        Emitido em ${today}
                    </div>
                </div>
                <div class="result-header">
                    <div class="result-label">Total a Pagar</div>
                    <div class="result-total">€${grandTotal.toFixed(2)}</div>
                    ${detention ? `
                    <div style="display:flex;justify-content:center;gap:24px;margin-top:10px;">
                        <div style="text-align:center;">
                            <div style="font-size:10px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;">Storage</div>
                            <div style="font-size:18px;font-weight:700;color:rgba(255,255,255,0.85);">€${cost.toFixed(2)}</div>
                        </div>
                        <div style="width:1px;background:rgba(255,255,255,0.2);"></div>
                        <div style="text-align:center;">
                            <div style="font-size:10px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;">Detention</div>
                            <div style="font-size:18px;font-weight:700;color:rgba(255,255,255,0.85);">€${detention.cost.toFixed(2)}</div>
                        </div>
                    </div>` : ''}
                </div>
                <div class="result-body">
                    <div class="result-section-divider">Storage</div>
                    <div class="result-free-days">
                        <span class="free-label">Dias Livres — ${freeDays} dias</span>
                        <span class="free-dates">${freeDatesLabel}</span>
                    </div>
                    ${periodsHTML}
                    ${detentionHTML}
                </div>
                <div class="result-btn-group">
                    <button class="result-copy-btn" onclick="copyResult()">Copiar resumo</button>
                    <button class="result-pdf-btn" onclick="exportPDF()">Exportar PDF</button>
                </div>
            `;
            lastResult = { cost, freeDays, freeDatesLabel, breakdown, detention, grandTotal };
            resultDiv.classList.add('show');
        }

        function copyResult() {
            if (!lastResult) return;
            const { cost, freeDays, freeDatesLabel, breakdown, detention, grandTotal } = lastResult;
            const lines = [];

            lines.push(`Storage — Resumo de Custos`);
            lines.push(`${'─'.repeat(42)}`);
            lines.push(`Dias Livres: ${freeDays} dias${freeDatesLabel ? '  (' + freeDatesLabel + ')' : ''}`);
            lines.push('');

            breakdown.forEach((item, idx) => {
                const isLastItem = idx === breakdown.length - 1 && periods[periods.length - 1].days === 0;
                const periodName = `Período ${idx + 1}${isLastItem ? ' (em diante)' : ''}`;
                const datesLabel = item.calStart
                    ? `${formatDate(item.calStart)} – ${formatDate(item.calEnd)}`
                    : isLastItem
                        ? `Dia ${item.startDay} em diante`
                        : `Dias ${item.startDay}–${item.endDay}`;
                lines.push(`${periodName}`);
                lines.push(`  ${datesLabel}`);
                lines.push(`  ${item.days} dias × €${item.rate.toFixed(2)}/dia = €${item.subtotal.toFixed(2)}`);
                if (idx < breakdown.length - 1) lines.push('');
            });

            if (detention) {
                lines.push('');
                lines.push(`${'─'.repeat(42)}`);
                lines.push(`DETENTION`);
                lines.push(`Dias Livres: ${detention.detentionFreeDays} dias${detention.freeDatesLabel ? '  (' + detention.freeDatesLabel + ')' : ''}`);
                lines.push('');
                detention.breakdown.forEach((item, idx) => {
                    const periodName = `Período ${idx + 1}${item.isLast ? ' (em diante)' : ''}`;
                    const datesLabel = item.calStart
                        ? `${formatDate(item.calStart)} – ${formatDate(item.calEnd)}`
                        : `${item.days} dias`;
                    lines.push(periodName);
                    lines.push(`  ${datesLabel}`);
                    lines.push(`  ${item.days} dias × €${item.rate.toFixed(2)}/dia = €${item.subtotal.toFixed(2)}`);
                    if (idx < detention.breakdown.length - 1) lines.push('');
                });
                lines.push('');
                lines.push(`${'─'.repeat(42)}`);
                lines.push(`Storage: €${cost.toFixed(2)}`);
                lines.push(`Detention:           €${detention.cost.toFixed(2)}`);
                lines.push(`${'─'.repeat(42)}`);
                lines.push(`TOTAL GERAL: €${grandTotal.toFixed(2)}`);
            } else {
                lines.push('');
                lines.push(`${'─'.repeat(42)}`);
                lines.push(`TOTAL A PAGAR: €${cost.toFixed(2)}`);
            }

            navigator.clipboard.writeText(lines.join('\n')).then(() => {
                const btn = document.querySelector('.result-copy-btn');
                const original = btn.textContent;
                btn.textContent = 'Copiado!';
                btn.style.background = '#1e3a5f';
                btn.style.color = 'white';
                setTimeout(() => {
                    btn.textContent = original;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        function exportPDF() {
            window.print();
        }

        function resetForm() {
            document.getElementById('calculatorForm').reset();
            document.getElementById('releaseDate').value = '';
            document.getElementById('pickupDate').value = '';
            document.getElementById('freeDays').value = '7';
            document.getElementById('totalDays').value = '20';
            document.getElementById('detentionEnabled').checked = false;
            document.getElementById('detentionSection').classList.remove('show');
            document.getElementById('returnDate').value = '';
            document.getElementById('detentionFreeDays').value = '7';
            detentionInitialized = false;
            detentionPeriods = [];
            const detCont = document.getElementById('detentionPeriodsContainer');
            if (detCont) detCont.innerHTML = '';
            initializePeriods();
            document.getElementById('result').classList.remove('show');
        }

        document.getElementById('calculatorForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });

        function clampDateYear(id) {
            const input = document.getElementById(id);
            if (!input.value) return;
            const parts = input.value.split('-');
            if (parts[0] && parts[0].length > 4) {
                parts[0] = parts[0].slice(0, 4);
                input.value = parts.join('-');
            }
        }

        // Inicializar ao carregar a página
        window.addEventListener('load', function() {
            initializePeriods();
            document.getElementById('releaseDate').addEventListener('change', function() {
                clampDateYear('releaseDate');
                calculateDays();
            });
            document.getElementById('pickupDate').addEventListener('change', function() {
                clampDateYear('pickupDate');
                calculateDays();
            });
            document.getElementById('returnDate').addEventListener('change', function() {
                clampDateYear('returnDate');
            });
        });

        function calculateDays() {
            const start = parseDate(document.getElementById('releaseDate').value);
            const end = parseDate(document.getElementById('pickupDate').value);

            if (start && end) {
                const diffDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                if (diffDays > 0) {
                    document.getElementById('totalDays').value = diffDays;
                }
            }
        }
    </script>
</body>
</html>
