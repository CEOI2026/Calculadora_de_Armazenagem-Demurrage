<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Storage e Detention</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"
            integrity="sha384-EnyY0/GSHQGSxSgMwaIPzSESbqoOLSexfnSMN2AP+39Ckmn92stwABZynq1JyzdT"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="single">
    <div class="page-shell">
        <div class="container">
            <div class="header">
                <div class="header-top">
                    <div class="logo">
                        <img src="assets/Navex_VH (3).png" alt="NAVEX Logo">
                    </div>
                    <div class="header-text">
                        <h1>Calculadora de Storage e Detention</h1>
                    </div>
                </div>
            </div>

            <div class="form-container">
                <div class="page-switcher">
                    <a href="index.html" class="active">Individual</a>
                    <a href="batch.html">Multiplos Contentores</a>
                </div>

                <div class="section-header">
                    <div>
                        <h2>Calculo Individual</h2>
                    </div>
                </div>

                <div class="calculator-grid">
                    <div class="surface surface-form">
                        <div class="surface-head">
                            <h3>Parametros do Contentor</h3>
                        </div>

                        <form id="calculatorForm">
                            <div class="single-input-grid">
                                <div class="form-group">
                                    <label for="releaseDate">
                                        Data de Descarga
                                    </label>
                                    <input type="date" id="releaseDate">
                                </div>

                                <div class="form-group">
                                    <label for="pickupDate">
                                        Data de Levantamento
                                    </label>
                                    <input type="date" id="pickupDate">
                                </div>

                                <div class="form-group">
                                    <label for="returnDate">
                                        Data de Devolucao
                                    </label>
                                    <input type="date" id="returnDate">
                                </div>

                                <div class="form-group">
                                    <label for="totalDays">
                                        Dias de Storage
                                    </label>
                                    <input type="number" id="totalDays" value="" min="1" readonly>
                                </div>

                                <div class="form-group">
                                    <label for="containerDays">
                                        Dias de Detention
                                    </label>
                                    <input type="number" id="containerDays" value="" min="1" readonly>
                                </div>
                            </div>

                            <div class="tariff-grid single-tariff-grid">
                                <div class="tariff-card batch-config-card">
                                    <div class="tariff-card-head tariff-card-head-inline">
                                        <span class="surface-kicker">Storage</span>
                                        <h4>Storage</h4>
                                        <button type="button" class="add-period-btn add-period-btn-inline" onclick="addPeriod()">+ Periodo</button>
                                    </div>

                                    <div class="batch-config-panel">
                                        <div class="batch-card-top batch-card-top-single">
                                            <div class="form-group">
                                                <label for="freeDays">
                                                    Dias Livres
                                                </label>
                                                <input type="number" id="freeDays" value="7" min="0">
                                            </div>
                                        </div>

                                        <div class="periods-container" id="periodsContainer"></div>
                                    </div>
                                </div>

                                <div class="tariff-card tariff-card-detention single-detention-card batch-config-card">
                                    <div class="tariff-card-head tariff-card-head-inline">
                                        <span class="surface-kicker">Detention</span>
                                        <h4>Detention</h4>
                                        <button type="button" class="add-period-btn add-period-btn-inline" onclick="addDetentionPeriod()">+ Periodo</button>
                                    </div>

                                    <div class="detention-section batch-config-panel single-detention-config" id="detentionSection">
                                        <div class="single-detention-top">
                                            <div class="form-group">
                                                <label for="detentionFreeDays">
                                                    Dias Livres
                                                </label>
                                                <input type="number" id="detentionFreeDays" value="7" min="0">
                                            </div>

                                            <div class="form-group detention-start-group">
                                                <label>Inicio da Contagem</label>
                                                <div class="detention-start-opts">
                                                    <label>
                                                        <input type="radio" name="detentionStart" value="release" checked>
                                                        Descarga
                                                    </label>
                                                    <label>
                                                        <input type="radio" name="detentionStart" value="pickup">
                                                        Levantamento
                                                    </label>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="periods-container" id="detentionPeriodsContainer"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="button-group single-actions">
                                <button type="button" onclick="calculate()">Calcular</button>
                                <button type="button" class="secondary" onclick="resetForm()">Limpar Tudo</button>
                            </div>
                        </form>
                    </div>

                    <div class="surface surface-result">
                        <div class="surface-head">
                            <h3>Resumo</h3>
                        </div>
                        <div id="result"></div>
                    </div>
                </div>

                <div class="mode-link-card surface">
                    <div>
                        <h3>Multiplos Contentores</h3>
                    </div>
                    <a class="mode-link" href="batch.html">Ir para Multiplos Contentores</a>
                </div>
            </div>
        </div>
    </div>

    <script src="pricing-engine.js"></script>
    <script src="app.js"></script>
</body>
</html>
